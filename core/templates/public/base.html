{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Water Risk Index{% endblock %}</title>
  <meta name="description" content="{% block description %}Independent water-supply risk scores for data-center sites, built from public USGS, NOAA, and EPA data.{% endblock %}">
  <!-- Open Graph so shared links render a clean card -->
  <meta property="og:title" content="{% block og_title %}Nemo Water Risk Index{% endblock %}">
  <meta property="og:description" content="Water-supply risk scores for data centers, from public hydrological data.">
  <meta property="og:type" content="website">
  <style>
    :root {
      --navy:#0b3d5c; --ink:#1a1f24; --muted:#5b6b78; --line:#e6ebef; --bg:#f7f9fb; --card:#fff;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
           color:var(--ink); background:var(--bg); line-height:1.5; }
    a { color:var(--navy); }
    .wrap { max-width:920px; margin:0 auto; padding:0 20px; }
    header.site { background:var(--navy); color:#fff; padding:14px 0; }
    header.site .wrap { display:flex; align-items:center; justify-content:space-between; }
    header.site a { color:#fff; text-decoration:none; font-weight:700; letter-spacing:.3px; }
    header.site nav a { font-weight:500; opacity:.85; margin-left:18px; font-size:14px; }
    .hero { padding:44px 0 8px; }
    .hero h1 { font-size:30px; margin:0 0 8px; color:var(--navy); }
    .hero p { color:var(--muted); max-width:620px; margin:0; }
    .featured { background:var(--navy); color:#fff; border-radius:14px; padding:22px 24px; margin:26px 0; }
    .featured .stat { font-size:34px; font-weight:800; margin:4px 0 2px; }
    .featured .sub { opacity:.85; font-size:14px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin:18px 0 8px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; text-decoration:none; color:inherit; display:block; transition:box-shadow .15s; }
    .card:hover { box-shadow:0 4px 18px rgba(11,61,92,.10); }
    .card .name { font-weight:700; color:var(--navy); }
    .card .ws { color:var(--muted); font-size:13px; margin-bottom:10px; }
    .scorebar { display:flex; align-items:baseline; gap:8px; }
    .scorebar .num { font-size:28px; font-weight:800; }
    .pill { display:inline-block; padding:2px 10px; border-radius:999px; color:#fff; font-size:12px; font-weight:700; }
    section.signup { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; margin:28px 0 40px; }
    section.signup h2 { margin:0 0 6px; color:var(--navy); }
    .form-row { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
    input[type=email] { flex:1; min-width:220px; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font-size:15px; }
    button { background:var(--navy); color:#fff; border:0; padding:11px 18px; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; }
    .ok { background:#e8f6ee; border:1px solid #bfe6cf; color:#1d6b3a; padding:10px 14px; border-radius:8px; margin-top:12px; }
    table { width:100%; border-collapse:collapse; margin-top:8px; }
    th,td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-size:14px; }
    th { color:var(--navy); }
    .barwrap { background:var(--line); border-radius:6px; height:10px; overflow:hidden; }
    .bar { height:10px; background:var(--navy); }
    footer.site { color:var(--muted); font-size:13px; padding:24px 0 40px; }
    .back { display:inline-block; margin:18px 0 0; font-size:14px; }
  </style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <a href="/">Nemo · Water Risk Index</a>
      <nav><a href="/api/sites/">API</a><a href="/#signup">Get the methodology</a></nav>
    </div>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site">
    <div class="wrap">
      Built from public USGS, U.S. Drought Monitor, and U.S. Census data. Scores are indicative
      and provided for risk-planning purposes. &copy; Nemo Water Risk.
    </div>
  </footer>
</body>
</html>
